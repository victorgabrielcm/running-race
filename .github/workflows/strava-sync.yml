name: Sync Strava Data
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
  push:
    branches: [master, main]
    paths: ['scripts/format_strava.py']
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Sync Strava
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python3 scripts/format_strava.py
      - name: Commit e Push
        run: |
          git config user.name "Strava Sync Bot"
          git config user.email "actions@github.com"
          git add data/races.json
          git diff --staged --quiet && echo "Sem mudancas." || \
            git commit -m "chore: sync Strava [$(date -u +%Y-%m-%d)]" && git push
