<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Tracker — Victor Gabriel</title>
  <meta name="description" content="Portfólio de corridas, medalhas e conquistas.">
  <meta name="theme-color" content="#0F2730">
  <link rel="icon" href="assets/logo-icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <img class="logo-mark" src="assets/logo-icon.png" alt="Victor Gabriel">
      </a>
      <a href="add.html" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Registrar Corrida
      </a>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="stats-bar">
        <div class="stat-item">
          <div class="stat-value" id="statRaces">0</div>
          <div class="stat-label">Corridas</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statKm">0 km</div>
          <div class="stat-label">Distância Total</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statBestPace">—</div>
          <div class="stat-label">Melhor Pace</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statMedals">0</div>
          <div class="stat-label">Medalhas</div>
        </div>
      </div>

      <div class="section-header">
        <h2 class="section-title">Minhas Corridas</h2>
      </div>
      <div class="races-grid" id="racesGrid"></div>
    </div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div>
          <div class="card-date" id="modalDate"></div>
          <div class="modal-title" id="modalName"></div>
          <div class="card-location" id="modalLocation"></div>
        </div>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-photos" id="modalPhotos"></div>
        <div class="modal-details" id="modalDetails"></div>
        <p class="modal-notes" id="modalNotes" style="display:none"></p>
        <a class="modal-strava-link" id="modalStrava" href="#" target="_blank" rel="noopener" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Ver no Strava
        </a>
        <div class="modal-actions">
          <a id="modalEditBtn" href="#" class="btn btn-ghost">Editar</a>
          <button id="modalDeleteBtn" class="btn btn-danger">Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
