<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Corrida — Victor Gabriel</title>
  <meta name="theme-color" content="#0F2730">
  <link rel="icon" href="assets/logo-icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <img class="logo-mark" src="assets/logo-icon.png" alt="Victor Gabriel">
      </a>
      <a href="index.html" class="btn btn-ghost">← Voltar</a>
    </div>
  </header>

  <main>
    <div class="container form-page">

      <div id="formHeader">
        <h1 class="form-page-title">Registrar Corrida</h1>
        <p class="form-page-sub">Preencha os dados da corrida. Os campos com * são obrigatórios.</p>
      </div>

      <form id="raceForm" novalidate>
        <input type="hidden" id="raceId">

        <div class="form-section">
          <div class="form-section-title">Dados da Corrida</div>
          <div class="form-grid">
            <div class="form-group form-full">
              <label class="form-label" for="name">Nome da corrida *</label>
              <input class="form-input" type="text" id="name" placeholder="Ex: Corrida de Rua São Paulo 10K" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="date">Data *</label>
              <input class="form-input" type="date" id="date" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="location">Local</label>
              <input class="form-input" type="text" id="location" placeholder="Ex: São Paulo, SP">
            </div>
            <div class="form-group">
              <label class="form-label" for="category">Categoria</label>
              <select class="form-select" id="category">
                <option value="">Selecione...</option>
                <option value="5K">5K</option>
                <option value="10K">10K</option>
                <option value="15K">15K</option>
                <option value="21K">Meia Maratona (21K)</option>
                <option value="42K">Maratona (42K)</option>
                <option value="Outro">Outro</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="medalType">Medalha</label>
              <select class="form-select" id="medalType">
                <option value="finisher">Finisher</option>
                <option value="bronze">Bronze</option>
                <option value="silver">Prata</option>
                <option value="gold">Ouro</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="bibNumber">Número do peito</label>
              <input class="form-input" type="text" id="bibNumber" placeholder="Ex: 1234">
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">Dados do Strava</div>
          <div class="form-grid cols-3">
            <div class="form-group">
              <label class="form-label" for="distance">Distância (km) *</label>
              <input class="form-input" type="number" id="distance" step="0.01" min="0" placeholder="10.00" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="time">Tempo (hh:mm:ss) *</label>
              <input class="form-input" type="text" id="time" placeholder="00:55:30" pattern="\d{2}:\d{2}:\d{2}" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="pace">Pace (min/km)</label>
              <input class="form-input" type="text" id="pace" placeholder="5:33">
            </div>
            <div class="form-group">
              <label class="form-label" for="heartRate">FC Média (bpm)</label>
              <input class="form-input" type="number" id="heartRate" min="0" placeholder="165">
            </div>
            <div class="form-group">
              <label class="form-label" for="heartRateMax">FC Máxima (bpm)</label>
              <input class="form-input" type="number" id="heartRateMax" min="0" placeholder="182">
            </div>
            <div class="form-group">
              <label class="form-label" for="elevation">Elevação (m)</label>
              <input class="form-input" type="number" id="elevation" min="0" placeholder="120">
            </div>
            <div class="form-group">
              <label class="form-label" for="calories">Calorias (kcal)</label>
              <input class="form-input" type="number" id="calories" min="0" placeholder="650">
            </div>
            <div class="form-group">
              <label class="form-label" for="position">Posição geral</label>
              <input class="form-input" type="number" id="position" min="1" placeholder="150">
            </div>
            <div class="form-group">
              <label class="form-label" for="totalParticipants">Total participantes</label>
              <input class="form-input" type="number" id="totalParticipants" min="1" placeholder="2000">
            </div>
            <div class="form-group form-full">
              <label class="form-label" for="stravaUrl">Link da atividade no Strava</label>
              <input class="form-input" type="url" id="stravaUrl" placeholder="https://www.strava.com/activities/...">
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">Fotos</div>
          <div class="photo-upload-grid">
            <div class="form-group">
              <label class="form-label">Número do peito (Bib)</label>
              <div class="photo-upload-area" id="bibDropArea">
                <input type="file" id="bibPhoto" accept="image/*">
                <div class="photo-upload-icon">🎽</div>
                <div class="photo-upload-label">Clique ou arraste a foto</div>
                <div class="photo-upload-sub">JPG, PNG ou WEBP</div>
                <img class="photo-preview" id="bibPreview" alt="Preview bib">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Medalha</label>
              <div class="photo-upload-area" id="medalDropArea">
                <input type="file" id="medalPhoto" accept="image/*">
                <div class="photo-upload-icon">🏅</div>
                <div class="photo-upload-label">Clique ou arraste a foto</div>
                <div class="photo-upload-sub">JPG, PNG ou WEBP</div>
                <img class="photo-preview" id="medalPreview" alt="Preview medalha">
              </div>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">Notas</div>
          <div class="form-group">
            <label class="form-label" for="notes">Como foi a corrida?</label>
            <textarea class="form-textarea" id="notes" placeholder="Escreva sobre a experiência, como se sentiu, condições climáticas..."></textarea>
          </div>
        </div>

        <div class="form-actions">
          <a href="index.html" class="btn btn-ghost">Cancelar</a>
          <button type="submit" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            Salvar Corrida
          </button>
        </div>

      </form>
    </div>
  </main>

  <script src="js/add.js"></script>
</body>
</html>
